[theme]
base            = "light"
primaryColor    = "#1a56db"
backgroundColor = "#f8f9fc"
secondaryBackgroundColor = "#ffffff"
textColor       = "#0f172a"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
